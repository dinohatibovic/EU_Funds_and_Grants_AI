# Dependabot — automatski PR-ovi za update zavisnosti (sedmično)
version: 2
updates:
  - package-ecosystem: pip
    directory: "/ai_core"
    schedule:
      interval: weekly
    labels: ["dependencies", "ai-core"]

  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    labels: ["dependencies", "backend"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]

  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
