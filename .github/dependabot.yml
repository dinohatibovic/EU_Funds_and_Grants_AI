# Dependabot — automatski PR-ovi za update zavisnosti (sedmično)
# `groups` + `directories` spajaju sve pip update-e (ai_core + backend) u JEDAN
# zbirni PR → sedmično stiže maksimalno 3 PR-a (pip, actions, docker)
version: 2
updates:
  - package-ecosystem: pip
    directories:
      - "/ai_core"
      - "/backend"
    schedule:
      interval: weekly
    labels: ["dependencies", "python"]
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
    # Bump baznog Python image-a (npr. 3.12 → 3.14) traži ručnu odluku.
    # Napomena: 3.12 → 3.14 je tehnički SEMVER-MINOR (major ostaje "3"),
    # pa moramo ignorisati i minor update-e, ne samo major.
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      docker:
        patterns: ["*"]
