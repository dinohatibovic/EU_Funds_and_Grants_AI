name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (critical errors — syntax, undefined names)
        run: ruff check --select E9,F63,F7,F82 .

  test:
    name: Unit tests (Backend + AI pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Backend tests
        run: pytest tests/backend_tests/ -v
      - name: AI pipeline tests
        run: pytest tests/ai_pipeline_tests/ -v

  deploy-backend:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK secret not set — Render auto-deploys on push anyway (skipping)."
          fi

  deploy-frontend:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # One-time setup: repo Settings → Pages → Source: "GitHub Actions",
    # otherwise this job has nowhere to deploy (until then it must not fail the pipeline).
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/src
      - id: deployment
        uses: actions/deploy-pages@v5
