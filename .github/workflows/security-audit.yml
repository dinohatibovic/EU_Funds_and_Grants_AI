name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    # Informational — a CVE in transitive dependencies must not block urgent fixes
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pip-audit
      - name: pip-audit
        # PYSEC-2026-311 (chromadb 1.5.9): no fixed version exists yet —
        # remove the ignore as soon as one ships (watch the pip-audit report)
        run: pip-audit --ignore-vuln PYSEC-2026-311

  static-security-scan:
    name: Static security analysis (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Bandit scan (medium+ severity)
        # B104 (bind 0.0.0.0) is intentional — the server must listen on all interfaces in a container
        run: bandit -r ai_core backend sdk -ll --skip B104

  secret-scan:
    name: Hardcoded secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
