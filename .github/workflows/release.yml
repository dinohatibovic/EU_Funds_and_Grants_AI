name: Release

# Triggered by pushing a git tag (e.g. v2.2.0):
#   git tag -a v2.2.0 -m "FinAssistBH v2.2.0" && git push origin v2.2.0
# Automatically: creates a GitHub Release + publishes the Docker image to GHCR (Packages)

on:
  push:
    tags: ["v*"]
  # Manual trigger (Actions → Release → Run workflow) — creates both the tag and the release
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v2.2.0)"
        required: true
        default: "v2.2.0"

permissions:
  contents: write
  packages: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          body: |
            **FinAssistBH — AI platform for EU grants in BiH**

            Version details: see [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

            Docker image: `docker pull ghcr.io/${{ github.repository_owner }}/finassistbh-backend:latest`

  docker-package:
    name: Publish Docker image (GHCR Packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata (tags from the git tag)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/finassistbh-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.tag_name }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
