# Lokalno orkestriranje za razvoj:
#   docker compose -f infrastructure/docker-compose.yml up -d
# ili jednostavno: make up
services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: finassistbh-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      # Perzistentna ChromaDB baza između restartova
      - chroma_data:/app/vector_db/chroma_db_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: finassistbh-frontend
    ports:
      - "3000:80"
    volumes:
      - ../frontend/src:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  chroma_data:
