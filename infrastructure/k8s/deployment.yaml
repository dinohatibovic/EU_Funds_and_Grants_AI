# Kubernetes manifest za backend (opcionalno — produkcija trenutno koristi Render).
# Primjena: kubectl apply -f infrastructure/k8s/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finassistbh-backend
  labels:
    app: finassistbh
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finassistbh
      tier: backend
  template:
    metadata:
      labels:
        app: finassistbh
        tier: backend
    spec:
      containers:
        - name: backend
          # Izgradi i push-aj image: docker build -f backend/Dockerfile -t <registry>/finassistbh-backend:latest .
          image: finassistbh-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: finassistbh-secrets   # GEMINI_API_KEY, JWT_SECRET, DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 60
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
